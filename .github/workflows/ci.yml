name: CI

on:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        # Same major as Neon (design §7) and docker-compose.yml.
        image: postgres:18
        env:
          POSTGRES_USER: paulitakes
          POSTGRES_PASSWORD: paulitakes
          POSTGRES_DB: paulitakes
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U paulitakes -d paulitakes"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://paulitakes:paulitakes@localhost:5432/paulitakes
      BETTER_AUTH_SECRET: ci-only-secret-not-used-in-any-deployed-env
      BETTER_AUTH_URL: http://localhost:3000
      # Sign-in is never exercised in CI; env validation just requires these.
      GOOGLE_CLIENT_ID: ci-dummy
      GOOGLE_CLIENT_SECRET: ci-dummy
      DISCORD_CLIENT_ID: ci-dummy
      DISCORD_CLIENT_SECRET: ci-dummy
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm format:check

      - run: pnpm typecheck

      # Validates the committed migrations apply cleanly to a fresh database —
      # must run before `pnpm test`, whose globalSetup would otherwise migrate
      # the service DB first and turn this check into a no-op.
      - run: pnpm db:migrate

      - run: pnpm test

      # Catches production-compile-only failures (prerender errors, invalid
      # route exports) that lint/typecheck/dev-mode e2e can't see.
      - run: pnpm build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm test:e2e
